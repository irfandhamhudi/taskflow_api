version: '3.8'

services:
  taskflow-api:
    container_name: taskflow-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/health').then(r => r.json()).then(data => { if (data.status === 'OK') process.exit(0); else process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
